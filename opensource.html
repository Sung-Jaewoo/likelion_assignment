<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>외대 지도 서비스</title>
  <style>
    #map {
      width: 100%;
      height: 500px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=여기에_자바스크립트키"></script>
  <script>
    const container = document.getElementById('map');

    const options = {
      center: new kakao.maps.LatLng(37.5976, 127.0571), // 예시 좌표
      level: 3 // 숫자가 작을수록 더 확대
    };

    const map = new kakao.maps.Map(container, options);
  </script>
</body>
</html>
