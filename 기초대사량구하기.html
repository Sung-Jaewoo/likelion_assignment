<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기초대사량 계산기</title>

  <style> 
  body {
      background: #fffbea; 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

  .calcul{
    background: #fff;
    padding:30px;
    border-radius:12px;
    width:320px;
  }
  h1{
    font-size:28px;
    font-weight:700;
    margin-bottom:20px;
    color: #333
  }
  button{
    padding:12px;
    width:100%;
    background:#4a90e2;
    color: #fff;
    border: none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
  }
  #result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
    color: #2c3e50;
  }
  </style>
</head>

<body>
    <div class="calcul">
        <h1>기초대사량 계산기</h1>
        <label>키(cm): <input type="number" id="height"></label><br>
        <label>몸무게(kg): <input type="number" id="weight"></label><br>
        <label>나이: <input type="number" id="age"></label><br>
        <label>성별:
            <select id="gender">
                <option value="male">남성</option>
                <option value="female">여성</option>
            </select>
        </label><br>
        <button onclick="calculate()">계산하기</button>
        <div id="result"></div>
    </div>




  <script>
    function calculate() {
      const height = document.getElementById("height").value;
      const weight = document.getElementById("weight").value;
      const age = document.getElementById("age").value;
      const gender = document.getElementById("gender").value;

      let bmr;

      if (gender === "male") {
        bmr = 10 * weight + 6.25 * height - 5 * age + 5;
      } else {
        bmr = 10 * weight + 6.25 * height - 5 * age - 161;
      }

      document.getElementById("result").innerText =
        "결과: " + Math.round(bmr) + " kcal"; /*round는 반올림 함수*/
    }
  </script>
</body>
</html>
